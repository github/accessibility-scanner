name: "Fix"
description: "Attempts to fix issues with Copilot."

inputs:
  issues:
    description: "List of issues to attempt to fix, as stringified JSON"
    required: true
  repository:
    description: "Repository (with owner) containing issues"
    required: true
  token:
    description: "Personal access token (PAT) with fine-grained permissions 'issues: write' and 'pull_requests: write'"
    required: true
  base_url:
    description: "Optional base URL for the GitHub API (for example, 'https://HOSTNAME/api/v3' for GitHub Enterprise Server)"
    required: false

outputs:
  fixings:
    description: "List of pull requests filed (and their associated issues), as stringified JSON"

runs:
  using: "node24"
  main: "bootstrap.js"

branding:
  icon: "compass"
  color: "blue"
